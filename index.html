<!DOCTYPE html>
<html lang="th">
  <head>
    <title>DSD Phayao Smart Check-in</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --blue-dark:  #0a2d6e;
        --blue-mid:   #1a56c4;
        --blue-light: #3b82f6;
        --green:      #16a34a;
        --green-light:#22c55e;
        --white:      #ffffff;
        --text-dark:  #0f172a;
        --text-mid:   #475569;
        --text-light: #94a3b8;
        --border:     #e2e8f0;
        --gold:       #d4a017;
        --shadow-md:  0 4px 16px rgba(10,45,110,.12);
        --radius-sm:  10px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; min-height: 100vh; font-family: 'Sarabun', sans-serif; background: var(--white); }
      .app-shell { width: 100%; background: var(--white); display: flex; flex-direction: column; min-height: 100vh; }
      .app-header { background: linear-gradient(145deg, var(--blue-dark) 0%, var(--blue-mid) 100%); padding: 36px 24px; position: relative; overflow: hidden; flex-shrink: 0; }
      .app-header::before { content: ''; position: absolute; width: 220px; height: 220px; border-radius: 50%; background: rgba(255,255,255,.05); top: -60px; right: -50px; }
      .header-logo { width: 80px; height: 80px; border-radius: 50%; background: var(--white); border: 3px solid var(--gold); box-shadow: 0 0 0 4px rgba(212,160,23,.2), var(--shadow-md); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; position: relative; z-index: 1; overflow: hidden; }
      .header-logo img { width: 74px; height: 74px; object-fit: contain; border-radius: 50%; }
      .header-title { text-align: center; position: relative; z-index: 1; }
      .header-title h1 { font-size: 1.55rem; font-weight: 800; color: var(--white); line-height: 1.2; }
      .header-title p { font-size: .82rem; color: rgba(255,255,255,.75); margin-top: 4px; }
      .card-body-wrap { background: var(--white); border-radius: 24px 24px 0 0; margin-top: -20px; padding: 24px 18px 32px; position: relative; z-index: 2; box-shadow: 0 -4px 16px rgba(0,0,0,.06); flex: 1; }
      .field-group { margin-bottom: 16px; }
      .field-label { display: flex; align-items: center; gap: 8px; font-size: .9rem; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }
      .field-icon { width: 28px; height: 28px; border-radius: 7px; background: #eff6ff; display: flex; align-items: center; justify-content: center; font-size: .9rem; flex-shrink: 0; }
      .app-input, .app-select { width: 100%; padding: 12px 14px; font-size: .95rem; font-family: 'Sarabun', sans-serif; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--white); color: var(--text-dark); outline: none; transition: border-color .2s, box-shadow .2s; appearance: none; -webkit-appearance: none; }
      .app-input:focus, .app-select:focus { border-color: var(--blue-light); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
      .app-input:disabled { background: #f8fafc; color: var(--text-dark); }
      .select-wrap { position: relative; }
      .select-wrap::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-mid); pointer-events: none; }
      .timetype-box { width: 100%; padding: 12px 14px; font-size: .95rem; font-family: 'Sarabun', sans-serif; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: #f8fafc; color: var(--text-light); transition: all .3s; }
      .timetype-box.enter { color: var(--green); background: #f0fdf4; border-color: #86efac; font-weight: 600; }
      .timetype-box.exit { color: var(--blue-mid); background: #eff6ff; border-color: #93c5fd; font-weight: 600; }
      .timetype-box.full { color: #dc2626; background: #fef2f2; border-color: #fca5a5; font-weight: 600; }
      .locked-msg { display: none; color: var(--green); font-size: .85rem; margin-top: 6px; padding: 6px 10px; background: #f0fdf4; border-radius: 8px; border: 1px solid #86efac; }
      .location-card { border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
      .location-card-inner { padding: 12px 14px; background: #f8fafc; display: flex; flex-direction: column; gap: 8px; }
      .location-row { display: flex; justify-content: space-between; align-items: center; font-size: .85rem; }
      .location-row-label { color: var(--text-mid); font-weight: 500; }
      .location-row-value { color: var(--text-dark); font-weight: 600; text-align: right; max-width: 60%; word-break: break-all; }
      .location-row-value.empty { color: var(--text-light); font-weight: 400; }
      .btn-gps { width: 100%; padding: 13px; font-size: .95rem; font-family: 'Sarabun', sans-serif; font-weight: 700; color: var(--white); background: linear-gradient(135deg, var(--blue-mid), var(--blue-light)); border: none; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(26,86,196,.25); transition: opacity .2s, transform .1s; margin-bottom: 10px; }
      .btn-gps:active { opacity: .85; transform: scale(.98); }
      .btn-save { width: 100%; padding: 14px; font-size: 1rem; font-family: 'Sarabun', sans-serif; font-weight: 800; color: var(--white); background: linear-gradient(135deg, var(--green), var(--green-light)); border: none; border-radius: var(--radius-sm); cursor: pointer; box-shadow: 0 4px 14px rgba(22,163,74,.28); transition: opacity .2s, transform .1s; }
      .btn-save:active { opacity: .85; transform: scale(.98); }
      .btn-save:disabled { opacity: .5; cursor: not-allowed; }
      .section-divider { height: 1px; background: var(--border); margin: 18px 0; }
      .swal2-popup { font-family: 'Sarabun', sans-serif !important; border-radius: 18px !important; }
      .swal2-title { font-size: 1.2rem !important; }
      .swal2-html-container { font-size: .95rem !important; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="app-header">
        <div class="header-logo">
          <img src="https://lh3.googleusercontent.com/d/1aS6GWRPckJs4wg4tAzcwvs73KZRufrAZ" alt="โลโก้"
               onerror="this.style.display='none'; this.parentElement.style.fontSize='28px'; this.parentElement.textContent='🏛️';">
        </div>
        <div class="header-title">
          <h1>DSD PHAYAO<br>SMART CHECK-IN</h1>
          <p>ระบบเช็กชื่อเข้าอบรม · สำนักงานพัฒนาฝีมือแรงงานพะเยา</p>
        </div>
      </div>

      <div class="card-body-wrap">
        <form id="locationForm">
          <div class="field-group">
            <div class="field-label"><div class="field-icon">📚</div> เลือกหลักสูตร</div>
            <div class="select-wrap">
              <select class="app-select" id="courseType" onchange="updateNameDropdown();" required>
                <option value="" selected disabled>-- กรุณาเลือกหลักสูตรก่อน --</option>
                <option value="หลักสูตรไฟฟ้ากำลัง">หลักสูตร ไฟฟ้ากำลัง</option>
                <option value="หลักสูตรกาแฟ">หลักสูตร กาแฟ</option>
                <option value="หลักสูตรเบเกอรี่">หลักสูตร เบเกอรี่</option>
              </select>
            </div>
          </div>

          <div class="field-group">
            <div class="field-label"><div class="field-icon">👤</div> ชื่อ-นามสกุล</div>
            <input type="text" class="app-input" id="name" list="nameList"
              placeholder="กรุณาเลือกหลักสูตรด้านบนก่อน..." required disabled>
            <datalist id="nameList"></datalist>
            <div class="locked-msg" id="lockedMsg">🔒 บัญชี LINE นี้ผูกกับชื่อของคุณแล้ว</div>
          </div>

          <div class="field-group">
            <div class="field-label"></div>
            <div class="timetype-box" id="timeTypeDisplay">กรุณาเลือกหลักสูตรและชื่อก่อน...</div>
            <input type="hidden" id="timeType">
          </div>

          <div class="section-divider"></div>

          <div class="field-group">
            <div class="field-label"></div>
            <button type="button" class="btn-gps" onclick="getLocation()">ตรวจสอบตำแหน่งของคุณ</button>
            <input type="hidden" id="latitude">
            <input type="hidden" id="longitude">
            <div class="location-card">
              <div class="location-card-inner">
                <div class="location-row">
                  <span class="location-row-label">พิกัดของคุณ</span>
                  <span class="location-row-value empty" id="yourLocation">ยังไม่ได้ตรวจสอบ</span>
                </div>
                <div class="location-row">
                  <span class="location-row-label">ระยะห่างจากสถานที่</span>
                  <span class="location-row-value empty" id="distance">ยังไม่ได้ตรวจสอบ</span>
                </div>
              </div>
            </div>
          </div>

          <div class="section-divider"></div>
          <button type="submit" class="btn-save" id="saveBtn">✅ บันทึกข้อมูล</button>
        </form>
      </div>
    </div>

    <script>
      // ========================================================
      //  ⚠️ ค่าที่ต้องตรวจสอบ / แก้ไขให้เป็นของคุณ
      // ========================================================
      const LIFF_ID  = '2010291124-cuelzcch';
      const API_URL  = 'https://script.google.com/macros/s/AKfycbxISLPK-LQ78R6iIHMMUO55XwHae6Va_ChzlODUOoMHd69HOE22KGyZEunw_Ivy6lJ2qQ/exec';

      const TARGET_LAT = 19.06117421820639;
      const TARGET_LNG = 99.92800924500672;
      const MAX_DIST   = 93;
      // ========================================================

      let lineUserId = '';
      let liffReady  = false;

      /* ── เรียก API หลังบ้าน (Apps Script) ── */
      async function callApi(action, payload) {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...payload })
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'เกิดข้อผิดพลาด');
        return data.result;
      }

      /* ── เริ่มต้น LIFF ── */
      async function initLiff() {
        try {
          await liff.init({ liffId: LIFF_ID });

          if (!liff.isLoggedIn()) {
            liff.login({ redirectUri: window.location.href });
            return;
          }

          let uid = '';
          try {
            const profile = await liff.getProfile();
            uid = profile.userId || '';
          } catch (err) { console.warn('getProfile failed:', err); }

          if (!uid) {
            const idToken = liff.getDecodedIDToken();
            if (idToken && idToken.sub) uid = idToken.sub;
          }

          if (!uid) throw new Error('ดึง userId ไม่สำเร็จ');

          lineUserId = uid;
          liffReady  = true;
          console.log('LINE ID =', lineUserId);

          const linkedName = await callApi('getLinkedName', { lineUserId });
          if (linkedName) {
            const nameInput = document.getElementById('name');
            nameInput.value = linkedName;
            nameInput.disabled = true;
            document.getElementById('lockedMsg').style.display = 'block';
            const courseSelect = document.getElementById('courseType');
            if (courseSelect.value) checkTimeType(linkedName, courseSelect.value);
          }
        } catch (e) {
          Swal.fire({ icon: 'error', title: 'LIFF Error', text: e.message || JSON.stringify(e) });
          console.error('LIFF Error:', e);
        }
      }
      initLiff();

      /* ── ดึงรายชื่อตามหลักสูตร ── */
      async function updateNameDropdown() {
        const courseType = document.getElementById('courseType').value;
        const nameInput  = document.getElementById('name');
        const lockedMsg  = document.getElementById('lockedMsg');

        if (lockedMsg.style.display === 'block') {
          const lockedName = nameInput.value;
          if (courseType && lockedName) checkTimeType(lockedName, courseType);
          return;
        }

        nameInput.value = '';
        nameInput.disabled = true;
        nameInput.placeholder = 'กำลังดึงรายชื่อ...';
        resetTimeTypeBox();

        if (courseType) {
          try {
            const names = await callApi('getNamesByCourse', { courseType });
            fillNameList(names);
            nameInput.disabled = false;
            nameInput.placeholder = 'พิมพ์หรือเลือกชื่อของคุณ...';
          } catch (e) {
            Swal.fire('ผิดพลาด', e.message, 'error');
          }
        }
      }

      function fillNameList(names) {
        const nameList = document.getElementById('nameList');
        nameList.innerHTML = '';
        (names || []).forEach(name => {
          const option = document.createElement('option');
          option.value = name;
          nameList.appendChild(option);
        });
      }

      function resetTimeTypeBox() {
        const box = document.getElementById('timeTypeDisplay');
        box.className = 'timetype-box';
        box.textContent = 'กรุณาเลือกหลักสูตรและชื่อก่อน...';
        document.getElementById('timeType').value = '';
      }

      async function checkTimeType(name, course) {
        const box = document.getElementById('timeTypeDisplay');
        const hidden = document.getElementById('timeType');
        box.className = 'timetype-box';
        box.textContent = '⏳ กำลังตรวจสอบ...';
        hidden.value = '';
        try {
          const type = await callApi('checkAttendanceType', { name, course });
          hidden.value = type;
          box.classList.remove('enter','exit','full');
          if (type === 'เข้าฝึกอบรม') { box.classList.add('enter'); box.textContent = '🟢 เข้าฝึกอบรม'; }
          else if (type === 'ออกฝึกอบรม') { box.classList.add('exit'); box.textContent = '🔵 ออกฝึกอบรม'; }
          else { box.classList.add('full'); box.textContent = '⚠️ ลงทะเบียนครบทั้งเข้าและออกแล้ววันนี้'; }
        } catch (e) {
          box.textContent = 'ตรวจสอบไม่สำเร็จ';
        }
      }

      document.getElementById('name').addEventListener('change', function() {
        const name = this.value.trim();
        const course = document.getElementById('courseType').value;
        if (!name || !course) return;
        checkTimeType(name, course);
      });

      /* ── GPS ── */
      function getLocation() {
        if (!navigator.geolocation) {
          Swal.fire({ icon:'error', title:'ไม่รองรับ GPS', html:'กรุณาใช้ <b>Chrome</b> หรือ <b>Safari</b> เวอร์ชันล่าสุด' });
          return;
        }
        Swal.fire({
          title: '📡 กำลังตรวจสอบพิกัด', html: 'กรุณา <b>อนุญาต</b> การเข้าถึงตำแหน่ง',
          allowOutsideClick: false,
          didOpen: () => {
            Swal.showLoading();
            navigator.geolocation.getCurrentPosition(
              (pos) => {
                const lat = pos.coords.latitude.toFixed(8);
                const lng = pos.coords.longitude.toFixed(8);
                document.getElementById('latitude').value = lat;
                document.getElementById('longitude').value = lng;
                const locEl = document.getElementById('yourLocation');
                const distEl = document.getElementById('distance');
                locEl.textContent = `${lat}, ${lng}`;
                locEl.classList.remove('empty');
                const dist = calculateDistance(lat, lng, TARGET_LAT, TARGET_LNG);
                const inZone = dist <= MAX_DIST;
                distEl.textContent = `${dist.toFixed(2)} เมตร ${inZone ? '✅' : '❌'}`;
                distEl.classList.remove('empty');
                distEl.style.color = inZone ? 'var(--green)' : '#dc2626';
                Swal.close();
                Swal.fire({
                  icon: inZone ? 'success' : 'warning',
                  title: inZone ? '✅ อยู่ในพื้นที่อบรม' : '⚠️ อยู่นอกพื้นที่อบรม',
                  text: `ระยะห่าง: ${dist.toFixed(2)} เมตร`, timer: 2500, showConfirmButton: false
                });
              },
              (err) => {
                Swal.close();
                let title = 'ไม่สามารถดึงพิกัดได้', msg = '';
                switch(err.code) {
                  case err.PERMISSION_DENIED: title = '🚫 ถูกปฏิเสธสิทธิ์'; msg = 'กรุณาอนุญาตการเข้าถึงตำแหน่ง'; break;
                  case err.POSITION_UNAVAILABLE: title = '📡 ไม่พบสัญญาณ GPS'; msg = 'กรุณาออกไปที่โล่งแจ้ง'; break;
                  case err.TIMEOUT: title = '⏱ หมดเวลา'; msg = 'กรุณาลองใหม่'; break;
                  default: msg = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
                }
                Swal.fire({ icon:'error', title, html:msg, confirmButtonText:'รับทราบ' });
              },
              { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
          }
        });
      }

      function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 1000;
      }
      function toRad(d) { return d * Math.PI / 180; }

      /* ── Submit ── */
      document.getElementById('locationForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        if (!liffReady || !lineUserId) {
          Swal.fire('ยังไม่พร้อม', 'ยังดึงข้อมูล LINE ไม่สำเร็จ กรุณาปิดแล้วเปิดลิงก์ใหม่ในแอป LINE', 'warning');
          return;
        }

        const name = document.getElementById('name').value;
        const timeType = document.getElementById('timeType').value;
        const courseType = document.getElementById('courseType').value;
        const latInput = document.getElementById('latitude').value;
        const lngInput = document.getElementById('longitude').value;

        if (!name || !courseType) { Swal.fire('ผิดพลาด','กรุณาเลือกหลักสูตรและชื่อ','error'); return; }
        if (timeType === 'ลงทะเบียนครบแล้ว') { Swal.fire('ไม่สามารถบันทึกได้','คุณลงทะเบียนครบทั้งเข้าและออกแล้ววันนี้','warning'); return; }
        if (!latInput || !lngInput) { Swal.fire('ผิดพลาด','กรุณาตรวจสอบตำแหน่งก่อนบันทึก','error'); return; }

        const lat = parseFloat(latInput), lng = parseFloat(lngInput);
        const dist = calculateDistance(lat, lng, TARGET_LAT, TARGET_LNG);
        if (dist > MAX_DIST) { Swal.fire('ไม่สามารถบันทึกได้',`ห่างจากสถานที่ ${dist.toFixed(0)} เมตร (เกิน ${MAX_DIST} เมตร)`,'error'); return; }

        Swal.fire({ title: '⏳ กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
          await callApi('saveData', {
            type: timeType, name, courseType, latitude: lat, longitude: lng, lineUserId
          });
          Swal.fire('สำเร็จ ✅','บันทึกข้อมูลเรียบร้อยแล้ว','success').then(() => {
            document.getElementById('yourLocation').textContent = 'ยังไม่ได้ตรวจสอบ';
            document.getElementById('yourLocation').classList.add('empty');
            document.getElementById('distance').textContent = 'ยังไม่ได้ตรวจสอบ';
            document.getElementById('distance').classList.add('empty');
            document.getElementById('distance').style.color = '';
            document.getElementById('latitude').value = '';
            document.getElementById('longitude').value = '';
            const lockedMsg = document.getElementById('lockedMsg');
            if (lockedMsg.style.display !== 'block') {
              document.getElementById('courseType').value = '';
              document.getElementById('name').value = '';
              document.getElementById('name').disabled = true;
            }
            resetTimeTypeBox();
          });
        } catch (err) {
          Swal.fire('ผิดพลาด', err.message, 'error');
        }
      });
    </script>
  </body>
</html>
